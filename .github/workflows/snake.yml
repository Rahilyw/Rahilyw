name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # runs once a day
  workflow_dispatch: {} # allows manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake animation SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Rahilyw
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#39d353,#26a641,#006d32&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ff2e63,#ff8c00,#ffe600&color_dots=#0e1117,#3a1c71,#7b2ff7,#e94560,#ff2e63

      - name: Push output to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
